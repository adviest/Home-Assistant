blueprint:
  name: "Open Window Energy Guard"
  description: >
    Monitors a window sensor and fires tiered alerts based on open duration
    and/or temperature drop since the window was opened. Level 1 = informational
    after X minutes open. Level 2 = warning after Y minutes OR when room temp
    drops more than Z degrees from the temperature at the moment the window opened.
    At Level 2 the zone heating switch is automatically turned off.
    When the window closes, heating is restored only if the blueprint turned it off
    and the switch is still off. Requires one input_number and one input_boolean
    helper per zone.
  domain: automation
  source_url: https://github.com/adviest/Home-Assistant/blob/main/Blueprints/open_window_energy_guard.yaml
  input:

    # ── Window ──────────────────────────────────────────────────────────────
    window_sensor:
      name: Window Sensor
      description: Binary sensor for the window (on = open).
      selector:
        entity:
          domain: binary_sensor

    # ── Timing thresholds ───────────────────────────────────────────────────
    level1_minutes:
      name: Level 1 – Alert after (minutes)
      description: Minutes the window must be open before Level 1 fires.
      default: 10
      selector:
        number:
          min: 1
          max: 120
          unit_of_measurement: min

    level2_minutes:
      name: Level 2 – Escalate after (minutes)
      description: Minutes the window must be open before Level 2 fires (time-based escalation).
      default: 20
      selector:
        number:
          min: 1
          max: 240
          unit_of_measurement: min

    # ── Temperature ──────────────────────────────────────────────────────────
    temp_sensor:
      name: Temperature Sensor
      description: Indoor temperature sensor for this area.
      selector:
        entity:
          domain: sensor
          device_class: temperature

    temp_drop_from_open:
      name: Temp-drop Level 2 trigger (°C drop since window opened)
      description: >
        Level 2 fires if the temperature drops this many degrees from the value
        recorded when the window was opened. Set to 0 to disable this trigger.
      default: 1.0
      selector:
        number:
          min: 0
          max: 5.0
          step: 0.5
          unit_of_measurement: "°C"

    temp_at_open_helper:
      name: Temp-at-open Helper
      description: >
        An input_number helper to persist the temperature snapshot taken when
        the window opens. Create one per zone in Settings → Helpers → Number
        (range -10 to 40, step 0.1). Reset to 0 automatically on window close.
      selector:
        entity:
          domain: input_number

    # ── Zone heating switch (Airzone) ────────────────────────────────────────
    heating_switch:
      name: Zone Heating Switch
      description: >
        The switch that enables/disables this zone (e.g. switch.airzone_salon).
        Turned OFF automatically at Level 2, restored on window close only if
        the blueprint was the one that turned it off and it is still off.
      selector:
        entity:
          domain: switch

    heating_stopped_flag:
      name: Heating Stopped by Blueprint Flag
      description: >
        An input_boolean helper to track whether this blueprint turned off the
        heating. Prevents restoring heating if the user had already turned it
        off manually. Create one per zone in Settings → Helpers → Toggle.
      selector:
        entity:
          domain: input_boolean

    # ── Level 1 actions ─────────────────────────────────────────────────────
    level1_actions:
      name: Level 1 Actions (informational)
      description: >
        Actions to run when Level 1 is reached (e.g. send a soft mobile
        notification, turn on an indicator light at low brightness).
      default: []
      selector:
        action: {}

    # ── Level 2 actions ─────────────────────────────────────────────────────
    level2_actions:
      name: Level 2 Actions (warning)
      description: >
        Actions to run when Level 2 is reached (e.g. flash a light, send an
        urgent push notification). Heating will ALSO be stopped automatically.
      default: []
      selector:
        action: {}

    # ── Window-closed actions ────────────────────────────────────────────────
    closed_actions:
      name: Window Closed Actions (optional)
      description: >
        Actions to run when the window is closed again (e.g. turn off
        indicator light, clear notification badge).
      default: []
      selector:
        action: {}

# ── Variables ──────────────────────────────────────────────────────────────
variables:
  temp_sensor: !input temp_sensor
  temp_drop_from_open: !input temp_drop_from_open
  heating_switch: !input heating_switch
  heating_stopped_flag: !input heating_stopped_flag
  window_sensor_entity: !input window_sensor
  temp_at_open_helper: !input temp_at_open_helper

# ── Triggers ───────────────────────────────────────────────────────────────
trigger:
  # Window just opened → snapshot temperature into helper
  - platform: state
    entity_id: !input window_sensor
    to: "on"
    id: window_just_opened

  # Window opened → start timing for L1
  - platform: state
    entity_id: !input window_sensor
    to: "on"
    for:
      minutes: !input level1_minutes
    id: level1_time

  # Window opened → start timing for L2 (time-based)
  - platform: state
    entity_id: !input window_sensor
    to: "on"
    for:
      minutes: !input level2_minutes
    id: level2_time

  # Temperature has dropped more than threshold since window opened
  - platform: template
    value_template: >
      {% set current_temp = states(temp_sensor) | float(99) %}
      {% set snapshot = states(temp_at_open_helper) | float(0) %}
      {% set drop = temp_drop_from_open | float(0) %}
      {{ states(temp_sensor) not in ['unavailable', 'unknown', 'none'] and
         is_state(window_sensor_entity, 'on') and
         drop > 0 and
         snapshot > 0 and
         current_temp <= (snapshot - drop) }}
    id: level2_temp

  # Window closed
  - platform: state
    entity_id: !input window_sensor
    to: "off"
    id: window_closed

# ── Conditions ─────────────────────────────────────────────────────────────
condition: []

# ── Actions ────────────────────────────────────────────────────────────────
action:
  - choose:

      # ── SNAPSHOT temp when window opens → write to input_number helper ────
      - conditions:
          - condition: trigger
            id: window_just_opened
        sequence:
          - condition: template
            value_template: >
              {{ states(temp_sensor) not in ['unavailable', 'unknown', 'none'] }}
          - service: input_number.set_value
            continue_on_error: true
            target:
              entity_id: !input temp_at_open_helper
            data:
              value: "{{ states(temp_sensor) | float(0) }}"

      # ── LEVEL 1 ──────────────────────────────────────────────────────────
      - conditions:
          - condition: trigger
            id: level1_time
          - condition: state
            entity_id: !input window_sensor
            state: "on"
          - condition: state
            entity_id: !input heating_switch
            state: "on"
          - condition: template
            value_template: >
              {{ states(temp_sensor) not in ['unavailable', 'unknown', 'none'] }}
        sequence:
          - choose: []
            default: !input level1_actions

      # ── LEVEL 2 (time-based) ─────────────────────────────────────────────
      - conditions:
          - condition: trigger
            id: level2_time
          - condition: state
            entity_id: !input window_sensor
            state: "on"
          - condition: state
            entity_id: !input heating_switch
            state: "on"
          - condition: template
            value_template: >
              {{ states(temp_sensor) not in ['unavailable', 'unknown', 'none'] }}
        sequence:
          - service: input_boolean.turn_on        # mark that blueprint turned off heating
            continue_on_error: true
            target:
              entity_id: !input heating_stopped_flag
          - service: switch.turn_off
            continue_on_error: true
            target:
              entity_id: !input heating_switch
          - choose: []
            default: !input level2_actions

      # ── LEVEL 2 (temp-drop) ──────────────────────────────────────────────
      - conditions:
          - condition: trigger
            id: level2_temp
          - condition: state
            entity_id: !input heating_switch
            state: "on"
          - condition: template
            value_template: >
              {{ states(temp_sensor) not in ['unavailable', 'unknown', 'none'] }}
        sequence:
          - service: input_boolean.turn_on        # mark that blueprint turned off heating
            continue_on_error: true
            target:
              entity_id: !input heating_stopped_flag
          - service: switch.turn_off
            continue_on_error: true
            target:
              entity_id: !input heating_switch
          - choose: []
            default: !input level2_actions

      # ── WINDOW CLOSED ────────────────────────────────────────────────────
      - conditions:
          - condition: trigger
            id: window_closed
        sequence:
          - service: input_number.set_value       # reset temp snapshot
            continue_on_error: true
            target:
              entity_id: !input temp_at_open_helper
            data:
              value: 0
          - if:
              - condition: state               # only restore if blueprint stopped it
                entity_id: !input heating_stopped_flag
                state: "on"
              - condition: state               # only restore if switch is still off
                entity_id: !input heating_switch
                state: "off"
            then:
              - service: switch.turn_on
                continue_on_error: true
                target:
                  entity_id: !input heating_switch
              - service: input_boolean.turn_off
                continue_on_error: true
                target:
                  entity_id: !input heating_stopped_flag
          - choose: []
            default: !input closed_actions    # always runs regardless of above

mode: single
max_exceeded: silent
